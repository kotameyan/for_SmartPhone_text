<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ用文章作成</title>

    <link rel="stylesheet" href="./style.css">
    <script defer src="./script.js"></script>
</head>

<body id="body_tag">
    <section class="layout">
        <div class="header">
            <!-- 隠れている要素 -->
            <div id="notification"></div>
            <div id="help_overview" class="help_content">
                <h3>スマホ用文章作成</h3>
                <p>スマートフォンから見ても見やすい文章を作成する<br>ために、文章の幅を調整するアプリケーションです。</p>
            </div>

            <!-- 見えている要素 -->
            <button class="button" id="help_button">
                <img src="./icon/help.svg" alt="ヘルプ" class="icon" id="help_icon">
            </button>
        </div>

        <div class="leftSide">
            <!-- 隠れている要素 -->
            <div id="help_service" class="help_content">
                <h3>step1, サービス選択</h3>
                <p>何のアプリの文章を作成するのか選択します。</p>
            </div>

            <!-- 見えている要素 -->
            <button class="button button_margin" id="LINE_button">
                <img src="./icon/LINE.png" alt="LINE用" class="icon" id="LINE_icon">
            </button>
            <button class="button button_margin" id="Teams_button">
                <img src="./icon/Teams.png" alt="Teams用" class="icon" id="Teams_icon">
            </button>
        </div>

        <div class="body">
            <!-- 隠れている要素 -->
            <div id="help_text" class="help_content">
                <h3>step2, 文章作成</h3>
                <p>ここで文章を作成します。</p>
            </div>

            <!-- 見えている要素 -->
            <textarea name="textarea_sentence" id="textarea_sentence" placeholder="リロードすると、文章と幅設定がリセットされます"></textarea>
        </div>

        <div class="rightSide">
            <!-- 隠れている要素 -->
            <div id="help_output" class="help_content">
                <h3>step3, 出力</h3>
                <p>上のボタンで文章を整形し、<br>下のボタンで文章をコピーし、<br>アプリに貼り付けて送信します。</p>
            </div>

            <!-- 見えている要素 -->
            <button class="button button_margin" id="format_button">
                <img src="./icon/format.png" alt="文章整形" class="icon" id="format_icon">
            </button>
            <button class="button button_margin" id="copy_button">
                <img src="./icon/copy.svg" alt="コピー" class="icon" id="copy_icon">
            </button>
        </div>

        <div class="footer"></div>
    </section>
</body>

</html>
